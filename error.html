<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error | Nexflow P2</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='%230c0e14'/><text y='.9em' font-size='80' x='10' fill='%23ff5c1a'>N</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700;800;900&family=Barlow+Condensed:wght@500;600;700;800;900&display=swap">
    <link rel="stylesheet" href="css/nexflow-design.css">
    <script src="js/navbar.js"></script>
</head>
<body>
    <div id="navbar-container"></div>

    <div class="nx-main">
        <div style="min-height: calc(100vh - 56px); display:flex; align-items:center; justify-content:center; padding: 24px;">
            <div class="nx-card nx-fade-in" style="max-width: 420px; width:100%; text-align:center; padding: 40px 32px;">

                <!-- Icon -->
                <div style="margin-bottom: 20px;">
                    <svg width="64" height="64" viewBox="0 0 20 20" fill="var(--red)" xmlns="http://www.w3.org/2000/svg" style="display:inline-block;">
                        <path fill-rule="evenodd" d="M8.257 3.099c.765-1.36 2.722-1.36 3.486 0l5.58 9.92c.75 1.334-.213 2.98-1.742 2.98H4.42c-1.53 0-2.493-1.646-1.743-2.98l5.58-9.92zM11 13a1 1 0 11-2 0 1 1 0 012 0zm-1-8a1 1 0 00-1 1v3a1 1 0 002 0V6a1 1 0 00-1-1z" clip-rule="evenodd"/>
                    </svg>
                </div>

                <!-- Heading -->
                <div style="font-family: var(--condensed); font-weight: 900; font-size: 22px; color: var(--red); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 14px;"
                     data-en="Something went wrong" data-mr="काहीतरी चूक झाली">
                    Something went wrong
                </div>

                <!-- Error message -->
                <p id="error-message" style="font-size: 14px; color: var(--light); margin-bottom: 28px; line-height: 1.6;"></p>

                <!-- Actions -->
                <div style="display:flex; flex-direction:column; gap:10px;">
                    <a href="index.html" class="nx-btn nx-btn-primary nx-btn-full"
                       data-en="Go to Dashboard" data-mr="डॅशबोर्डवर जा">
                        Go to Dashboard
                    </a>
                    <a href="https://wa.me/7248932468" target="_blank"
                       class="nx-btn nx-btn-ghost nx-btn-full"
                       data-en="Contact Support via WhatsApp" data-mr="व्हाट्सअॅपद्वारे समर्थनाशी संपर्क साधा">
                        Contact Support via WhatsApp
                    </a>
                </div>

                <div style="margin-top: 16px; font-size: 11px; color: var(--mid);"
                     data-en="Need help?" data-mr="मदत हवी आहे?">Need help?</div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const errorMsg  = urlParams.get('msg');
            const errorMessageEl = document.getElementById('error-message');

            if (errorMsg) {
                errorMessageEl.textContent = decodeURIComponent(errorMsg);
            } else {
                const lang = localStorage.getItem('nexflow_lang') || 'en';
                errorMessageEl.textContent = lang === 'mr'
                    ? 'एक अनपेक्षित त्रुटी आली. कृपया पुन्हा प्रयत्न करा.'
                    : 'An unexpected error occurred. Please try again.';
            }

            const saved = localStorage.getItem('nexflow_lang') || 'en';
            applyLang(saved);
        });

        function applyLang(lang) {
            document.querySelectorAll('[data-en]').forEach(el => {
                if (el.tagName === 'INPUT' || el.tagName === 'SELECT' || el.tagName === 'TEXTAREA') {
                    el.placeholder = lang === 'mr' ? el.dataset.mr : el.dataset.en;
                } else {
                    el.textContent = lang === 'mr' ? el.dataset.mr : el.dataset.en;
                }
            });
            const btn = document.getElementById('lang-toggle');
            if (btn) btn.textContent = lang === 'mr' ? 'English' : 'मराठी';
            localStorage.setItem('nexflow_lang', lang);
        }
    </script>
<script src="js/agent-chat.js"></script>
</body>
</html>
