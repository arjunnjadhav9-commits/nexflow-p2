<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Nexflow P2</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='%230c0e14'/><text y='.9em' font-size='80' x='10' fill='%23ff5c1a'>N</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700;800;900&family=Barlow+Condensed:wght@500;600;700;800;900&display=swap">
    <link rel="stylesheet" href="css/nexflow-design.css">
    <script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    <script src="js/supabase-client.js"></script>

    <style>
        body {
            min-height: 100svh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px 16px;
        }

        .login-wrap {
            width: 100%;
            max-width: 400px;
        }

        .login-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 36px 28px;
            box-shadow: var(--shadow-md);
        }

        .login-icon-mark {
            width: 44px; height: 44px;
            margin: 0 auto 16px;
            background: linear-gradient(135deg, #00BCD4, #00E676);
            -webkit-mask-image: url('assets/nexflow-mark.png');
            mask-image: url('assets/nexflow-mark.png');
            -webkit-mask-size: contain;
            mask-size: contain;
            -webkit-mask-repeat: no-repeat;
            mask-repeat: no-repeat;
            -webkit-mask-position: center;
            mask-position: center;
        }

        .login-logo {
            font-family: var(--condensed);
            font-weight: 900;
            font-size: 28px;
            color: var(--white);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 4px;
        }
        .login-logo span { color: var(--orange); }

        .login-sub {
            font-size: 13px;
            color: var(--mid);
            margin-bottom: 28px;
        }

        /* Error message */
        .login-error {
            display: none;
            background: var(--red-dim);
            border: 1px solid rgba(239,68,68,0.25);
            border-left: 3px solid var(--red);
            border-radius: var(--radius);
            padding: 11px 14px;
            font-size: 13px;
            color: var(--red);
            margin-bottom: 18px;
        }

        /* Footer */
        .login-footer {
            text-align: center;
            margin-top: 20px;
            font-size: 11px;
            color: var(--mid);
        }

        /* Loading state on button */
        .nx-btn[data-loading="true"] {
            opacity: 0.6;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="login-wrap nx-fade-in">

        <!-- Logo above card -->
        <div style="text-align:center; margin-bottom:24px;">
            <div class="login-icon-mark"></div>
            <div class="login-logo">Nexflow <span>P2</span></div>
            <div class="login-sub">Raw Material &amp; Inventory Tracker</div>
        </div>

        <div class="login-card">

            <div id="loginError" class="login-error"></div>

            <form id="loginForm">
                <div class="nx-form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" required class="nx-input"
                           placeholder="your@email.com" autocomplete="email">
                </div>

                <div class="nx-form-group" style="margin-bottom:24px;">
                    <label for="password">Password</label>
                    <div style="position:relative;">
                        <input type="password" id="password" required class="nx-input"
                               placeholder="••••••••" autocomplete="current-password"
                               style="padding-right:44px;">
                        <button type="button" id="togglePassword"
                                style="position:absolute; right:12px; top:50%; transform:translateY(-50%);
                                       background:none; border:none; color:var(--mid); cursor:pointer;
                                       font-size:16px; line-height:1; padding:4px;"
                                aria-label="Toggle password visibility">👁</button>
                    </div>
                </div>

                <button type="submit" id="loginBtn" class="nx-btn nx-btn-primary nx-btn-lg nx-btn-full">
                    Sign In
                </button>
            </form>
        </div>

        <div class="login-footer">
            Powered by Nexflow Automations · MIDC Manufacturing ERP
        </div>
    </div>

    <script>
        // Toggle password visibility
        document.getElementById('togglePassword').addEventListener('click', () => {
            const pwd = document.getElementById('password');
            pwd.type = pwd.type === 'password' ? 'text' : 'password';
        });

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const email    = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const btn      = document.getElementById('loginBtn');
            const errorDiv = document.getElementById('loginError');

            // Clear previous error
            errorDiv.style.display = 'none';
            errorDiv.textContent   = '';

            // Loading state
            btn.dataset.loading  = 'true';
            btn.textContent      = 'Signing in...';

            try {
                const { data, error } = await window.supabase.auth.signInWithPassword({ email, password });
                if (error) throw error;
                window.location.href = 'index.html';
            } catch (error) {
                errorDiv.textContent   = error.message || 'Login failed. Check your credentials.';
                errorDiv.style.display = 'block';
                errorDiv.classList.add('nx-fade-in');
                btn.dataset.loading    = 'false';
                btn.textContent        = 'Sign In';
            }
        });

        // If already logged in, redirect
        window.supabase.auth.getSession().then(({ data: { session } }) => {
            if (session) window.location.href = 'index.html';
        });
    </script>
</body>
</html>
