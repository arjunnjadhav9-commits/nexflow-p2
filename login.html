<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Nexflow P2</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='%230c0e14'/><text y='.9em' font-size='80' x='10' fill='%23ff5c1a'>N</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700;800;900&family=Barlow+Condensed:wght@500;600;700;800;900&display=swap">
    <link rel="stylesheet" href="css/nexflow-design.css">
    <script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    <script src="js/supabase-client.js"></script>

    <style>
        body {
            min-height: 100svh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px 16px;
        }

        .login-wrap {
            width: 100%;
            max-width: 400px;
        }

        .login-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 36px 28px;
            box-shadow: var(--shadow-md);
        }

        /* ── SPLASH SCREEN ── */
        .nx-splash {
            position: fixed;
            inset: 0;
            z-index: 999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 18px;
            background: var(--bg);
            animation: nx-splash-out 0.5s ease forwards;
            animation-delay: 2.4s;
        }
        .nx-splash-mark {
            width: 72px; height: 72px;
            background: linear-gradient(135deg, #ff5c1a, #ff8c42);
            -webkit-mask-image: url('assets/nexflow-mark.png');
            mask-image: url('assets/nexflow-mark.png');
            -webkit-mask-size: contain;
            mask-size: contain;
            -webkit-mask-repeat: no-repeat;
            mask-repeat: no-repeat;
            -webkit-mask-position: center;
            mask-position: center;
            opacity: 0;
            animation: nx-splash-mark-in 0.6s ease forwards;
            animation-delay: 0.1s;
        }
        .nx-splash-wordmark {
            font-family: var(--condensed);
            font-weight: 800;
            font-size: 22px;
            letter-spacing: 3px;
            color: var(--white);
            text-align: center;
        }
        .nx-splash-sub-letter { color: var(--mid); font-size: 12px; letter-spacing: 2px; }
        .nx-splash-letter {
            display: inline-block;
            opacity: 0;
            transform: translateY(6px);
            animation: nx-splash-letter-in 0.35s ease forwards;
        }
        /* Stagger each letter — NEXFLOW (7 letters) then AUTOMATIONS (12 chars incl. space) */
        .nx-splash-letter:nth-child(1)  { animation-delay: 0.45s; }
        .nx-splash-letter:nth-child(2)  { animation-delay: 0.50s; }
        .nx-splash-letter:nth-child(3)  { animation-delay: 0.55s; }
        .nx-splash-letter:nth-child(4)  { animation-delay: 0.60s; }
        .nx-splash-letter:nth-child(5)  { animation-delay: 0.65s; }
        .nx-splash-letter:nth-child(6)  { animation-delay: 0.70s; }
        .nx-splash-letter:nth-child(7)  { animation-delay: 0.75s; }
        .nx-splash-letter:nth-child(n+8) { animation-delay: 0.95s; }
        .nx-splash-quote {
            max-width: 320px;
            text-align: center;
            font-size: 13px;
            font-style: italic;
            color: var(--mid);
            padding: 0 24px;
            opacity: 0;
            animation: nx-fade-up 0.5s ease forwards;
            animation-delay: 1.3s;
        }
        @keyframes nx-splash-mark-in {
            from { opacity: 0; transform: scale(0.7); }
            to   { opacity: 1; transform: scale(1); }
        }
        @keyframes nx-splash-letter-in {
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes nx-splash-out {
            from { opacity: 1; visibility: visible; }
            to   { opacity: 0; visibility: hidden; pointer-events: none; }
        }
        @media (prefers-reduced-motion: reduce) {
            .nx-splash { animation-duration: 0.01ms; animation-delay: 0s; }
            .nx-splash-mark, .nx-splash-letter, .nx-splash-quote { animation: none; opacity: 1; transform: none; }
        }

        .login-icon-mark {
            width: 44px; height: 44px;
            margin: 0 auto 16px;
            background: linear-gradient(135deg, #ff5c1a, #ff8c42);
            -webkit-mask-image: url('assets/nexflow-mark.png');
            mask-image: url('assets/nexflow-mark.png');
            -webkit-mask-size: contain;
            mask-size: contain;
            -webkit-mask-repeat: no-repeat;
            mask-repeat: no-repeat;
            -webkit-mask-position: center;
            mask-position: center;
        }

        .login-logo {
            font-family: var(--condensed);
            font-weight: 900;
            font-size: 28px;
            color: var(--white);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 4px;
        }
        .login-logo span { color: var(--orange); }

        .login-sub {
            font-size: 13px;
            color: var(--mid);
            margin-bottom: 28px;
        }

        /* Error message */
        .login-error {
            display: none;
            background: var(--red-dim);
            border: 1px solid rgba(239,68,68,0.25);
            border-left: 3px solid var(--red);
            border-radius: var(--radius);
            padding: 11px 14px;
            font-size: 13px;
            color: var(--red);
            margin-bottom: 18px;
        }

        /* Footer */
        .login-footer {
            text-align: center;
            margin-top: 20px;
            font-size: 11px;
            color: var(--mid);
        }

        /* Loading state on button */
        .nx-btn[data-loading="true"] {
            opacity: 0.6;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <!-- SPLASH SCREEN — plays once per session, then fades to reveal login -->
    <div id="splashScreen" class="nx-splash">
        <div class="nx-splash-mark"></div>
        <div class="nx-splash-wordmark">
            <span class="nx-splash-letter">N</span><span class="nx-splash-letter">E</span><span class="nx-splash-letter">X</span><span class="nx-splash-letter">F</span><span class="nx-splash-letter">L</span><span class="nx-splash-letter">O</span><span class="nx-splash-letter">W</span>
            <span class="nx-splash-letter nx-splash-sub-letter"> </span><span class="nx-splash-letter nx-splash-sub-letter">A</span><span class="nx-splash-letter nx-splash-sub-letter">U</span><span class="nx-splash-letter nx-splash-sub-letter">T</span><span class="nx-splash-letter nx-splash-sub-letter">O</span><span class="nx-splash-letter nx-splash-sub-letter">M</span><span class="nx-splash-letter nx-splash-sub-letter">A</span><span class="nx-splash-letter nx-splash-sub-letter">T</span><span class="nx-splash-letter nx-splash-sub-letter">I</span><span class="nx-splash-letter nx-splash-sub-letter">O</span><span class="nx-splash-letter nx-splash-sub-letter">N</span><span class="nx-splash-letter nx-splash-sub-letter">S</span>
        </div>
        <div id="splashQuote" class="nx-splash-quote"></div>
    </div>

    <div class="login-wrap nx-fade-in">

        <!-- Logo above card -->
        <div style="text-align:center; margin-bottom:24px;">
            <div class="login-icon-mark"></div>
            <div class="login-logo">Nexflow <span>P2</span></div>
            <div class="login-sub">Raw Material &amp; Inventory Tracker</div>
        </div>

        <div class="login-card">

            <div id="loginError" class="login-error"></div>

            <form id="loginForm">
                <div class="nx-form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" required class="nx-input"
                           placeholder="your@email.com" autocomplete="email">
                </div>

                <div class="nx-form-group" style="margin-bottom:24px;">
                    <label for="password">Password</label>
                    <div style="position:relative;">
                        <input type="password" id="password" required class="nx-input"
                               placeholder="••••••••" autocomplete="current-password"
                               style="padding-right:44px;">
                        <button type="button" id="togglePassword"
                                style="position:absolute; right:12px; top:50%; transform:translateY(-50%);
                                       background:none; border:none; color:var(--mid); cursor:pointer;
                                       font-size:16px; line-height:1; padding:4px;"
                                aria-label="Toggle password visibility">👁</button>
                    </div>
                </div>

                <button type="submit" id="loginBtn" class="nx-btn nx-btn-primary nx-btn-lg nx-btn-full">
                    Sign In
                </button>
            </form>
        </div>

        <div class="login-footer">
            Powered by Nexflow Automations · MIDC Manufacturing ERP
        </div>
    </div>

    <script>
        // ── SPLASH SCREEN: plays once per browser session ──
        (function initSplash() {
            const splash = document.getElementById('splashScreen');
            if (sessionStorage.getItem('nx_splash_seen')) {
                splash.style.display = 'none';
                return;
            }
            sessionStorage.setItem('nx_splash_seen', '1');

            const quotes = [
                'Small businesses run on momentum, not luck.',
                'Every great system started with someone tired of spreadsheets.',
                'Discipline compounds faster than capital.',
                'The work you do when no one is watching builds the company.',
                'Simple tools, used daily, beat perfect tools used rarely.'
            ];
            const quoteEl = document.getElementById('splashQuote');
            quoteEl.textContent = quotes[Math.floor(Math.random() * quotes.length)];

            // Remove splash from DOM entirely after its fade-out animation
            // finishes (2.4s delay + 0.5s transition = 2.9s), so it never
            // sits invisibly on top of the page blocking clicks.
            setTimeout(() => { splash.remove(); }, 2900);
        })();

        // Toggle password visibility
        document.getElementById('togglePassword').addEventListener('click', () => {
            const pwd = document.getElementById('password');
            pwd.type = pwd.type === 'password' ? 'text' : 'password';
        });

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const email    = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const btn      = document.getElementById('loginBtn');
            const errorDiv = document.getElementById('loginError');

            // Clear previous error
            errorDiv.style.display = 'none';
            errorDiv.textContent   = '';

            // Loading state
            btn.dataset.loading  = 'true';
            btn.textContent      = 'Signing in...';

            try {
                const { data, error } = await window.supabase.auth.signInWithPassword({ email, password });
                if (error) throw error;
                window.location.href = 'index.html';
            } catch (error) {
                errorDiv.textContent   = error.message || 'Login failed. Check your credentials.';
                errorDiv.style.display = 'block';
                errorDiv.classList.add('nx-fade-in');
                btn.dataset.loading    = 'false';
                btn.textContent        = 'Sign In';
            }
        });

        // If already logged in, redirect
        window.supabase.auth.getSession().then(({ data: { session } }) => {
            if (session) window.location.href = 'index.html';
        });
    </script>
</body>
</html>
