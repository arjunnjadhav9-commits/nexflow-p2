<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Nexflow P2</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='%231A1F2E'/><text y='.9em' font-size='80' x='10' fill='%2300BCD4'>N</text></svg>">
    <script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    <script src="js/supabase-client.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        'dark-bg': '#1A1F2E',
                        'teal': '#00BCD4'
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-dark-bg text-gray-200 min-h-screen flex items-center justify-center">
    <div class="w-full max-w-md p-8 space-y-6 bg-gray-800 rounded-xl shadow-md">
        <h2 class="text-2xl font-bold text-center">Nexflow Login</h2>
        <form id="loginForm" class="space-y-4">
            <div>
                <label for="email" class="block mb-2">Email</label>
                <input
                    type="email"
                    id="email"
                    required
                    class="w-full px-3 py-2 border rounded bg-gray-700 border-gray-600 text-white"
                >
            </div>
            <div>
                <label for="password" class="block mb-2">Password</label>
                <input
                    type="password"
                    id="password"
                    required
                    class="w-full px-3 py-2 border rounded bg-gray-700 border-gray-600 text-white"
                >
            </div>
            <button
                type="submit"
                class="w-full py-2 bg-teal text-white rounded hover:bg-teal-600 transition"
            >
                Sign In
            </button>
        </form>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                const { data, error } = await window.supabase.auth.signInWithPassword({
                    email,
                    password
                });

                if (error) throw error;

                // Redirect to index on successful login
                window.location.href = 'index.html';
            } catch (error) {
                alert('Login failed: ' + error.message);
            }
        });
    </script>
</body>
</html>
